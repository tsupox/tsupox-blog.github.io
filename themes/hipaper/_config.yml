# ---------------------------------------------------------------
# Site Information Settings
# ---------------------------------------------------------------

# Header Menu
menu:
  "[▶ Works]": https://tsupox.com/
  "[▶ Blog] Home": /
  Archives: archives
  Osaka-Expo-2025: /2025-osaka-expo/
  # Categories: categories
  # Tags: tags
  # About: about
rss: /atom.xml


# Set default keywords (Use a comma to separate)
keywords: "tsupox,picture,images"

# Put your favicon.ico into `hexo-site/themes/hipaper/source/` directory.
favicon: css/images/favicon.ico


# Put your avatar.jpg into `hexo-site/themes/hipaper/source/` directory.
# url is target link (E.g. `url: https://hexo.io/logo.svg` or `url: css/images/mylogo.jpg`)
avatar:
  enable: true
  width: 64
  height: 64
  bottom: 10
  url: images/tsupo.svg


# AboutPage background, support multiple images.
about_big_image: [css/images/pose01.jpg, https://source.unsplash.com/collection/954550/1920x1080, https://source.unsplash.com/collection/954550/1920x1081]


# Homepage thumbnail
random_thumb: false


# Content
fancybox: true


# Sidebar
sidebar: right
widgets:
- search
- social
- recent_posts
- category
- tag
- tagcloud
- archive

# Social Links
# Key is the name of FontAwsome icon.
# Value is the target link (E.g. GitHub: https://github.com/iTimeTraveler)
social:
  Github: https://github.com/tsupox
  Twitter: https://twitter.com/tsupopic
  Facebook:
  Google-plus:
  Instagram: https://www.instagram.com/tsupox/
  bluesky: https://bsky.app/profile/tsupox.bsky.social
  threads: https://www.threads.net/@tsupox



# Search
search:
    insight: true # you need to install `hexo-generator-json-content` before using Insight Search
    swiftype: # enter swiftype install key here
    baidu: false # you need to disable other search engines to use Baidu search, options: true, false


# comment ShortName, you can choose only ONE to display.
duoshuo_shortname:
disqus_shortname:
livere_shortname:
uyan_uid:
wumii:


# Code Highlight theme
# Available value:
#    default | normal | night | night eighties | night blue | night bright
# https://github.com/chriskempson/tomorrow-theme
highlight_theme: default


# widget behavior
archive_type: 'monthly'
show_count: true

# Google Webmaster tools verification setting
# See: https://www.google.com/webmasters/
google_site_verification:

# Miscellaneous
google_analytics: G-6JCSYQKLZX
twitter:
google_plus:
fb_admins:
fb_app_id:

# Facebook SDK Support.
# https://github.com/iissnan/hexo-theme-next/pull/410
facebook_sdk:
  enable: false
  app_id:       #<app_id>
  fb_admin:     #<user_id>
  like_button:  #true
  webmaster:    #true

# CNZZ count
cnzz_siteid:
